name: Build and push PHP images

on:
  push:
    tags: ["v*"]

env:
  REGISTRY: ghcr.io
  IMAGE: ${{ github.repository_owner }}/php-symfony

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        php: ["8.2", "8.5"]

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.php }}
        uses: docker/build-push-action@v6
        with:
          context: php/${{ matrix.php }}
          target: prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.php }}-${{ steps.version.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ matrix.php }}
